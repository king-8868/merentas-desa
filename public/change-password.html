<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tukar Kata Laluan - Merentas Desa 2026</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css">
<style>
body { display: flex; flex-direction: column; min-height: 100vh; }
main { display: flex; align-items: center; justify-content: center; flex: 1; }
.login-card { max-width: 420px; width: 100%; margin: 0 1rem; }
.login-card h1 { font-size: 1.1rem; text-align: center; margin-bottom: 0.25rem; }
.login-card h2 { font-size: 0.9rem; text-align: center; color: var(--text-secondary); font-weight: 500; margin-top: 0; margin-bottom: 1.5rem; }
</style>
</head>
<body>
<main style="margin: 0; padding: 0;">
  <div class="card login-card">
    <h1>KEJOHANAN MERENTAS DESA 2026</h1>
    <h2>Tukar Kata Laluan</h2>
    <p class="hint" id="forcedHint">Akaun anda menggunakan kata laluan lalai. Sila tetapkan kata laluan baharu sebelum meneruskan.</p>
    <form id="changeForm">
      <label>Kata Laluan Semasa</label>
      <input type="password" id="currentPassword" autocomplete="current-password" required>
      <label>Kata Laluan Baharu</label>
      <input type="password" id="newPassword" autocomplete="new-password" minlength="6" required>
      <label>Sahkan Kata Laluan Baharu</label>
      <input type="password" id="confirmPassword" autocomplete="new-password" minlength="6" required>
      <button type="submit" style="width:100%;">Tukar Kata Laluan</button>
    </form>
    <p id="msg"></p>
  </div>
</main>
<script src="app.js"></script>
<script>
(async () => {
  try {
    const res = await fetch('/api/auth/me');
    if (!res.ok) {
      window.location.href = 'login.html';
      return;
    }
    const user = await res.json();
    if (!user.mustChangePassword) {
      document.getElementById('forcedHint').style.display = 'none';
    }
  } catch (err) {
    window.location.href = 'login.html';
  }
})();

document.getElementById('changeForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const currentPassword = document.getElementById('currentPassword').value;
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const msg = document.getElementById('msg');

  if (newPassword !== confirmPassword) {
    msg.textContent = 'Kata laluan baharu tidak sepadan';
    msg.style.color = 'red';
    return;
  }

  try {
    await fetchJSON('/api/auth/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ currentPassword, newPassword }),
    });
    window.location.href = 'index.html';
  } catch (err) {
    msg.textContent = err.message;
    msg.style.color = 'red';
  }
});
</script>
</body>
</html>
