<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kejohanan Merentas Desa 2026</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="title-block">
    <h1>KEJOHANAN MERENTAS DESA SEMPENA HARI KEBANGSAAN 2026</h1>
    <h2>PERINGKAT SEKOLAH ZON LUAR BANDAR</h2>
  </div>
  <nav></nav>
</header>
<main>
  <div class="card">
    <h2 class="section-title">Ringkasan Acara</h2>
    <div id="summary" class="stats"><p class="empty">Loading...</p></div>
  </div>
  <div class="card">
    <h2 class="section-title">Sekolah Yang Menyertai</h2>
    <table>
      <thead><tr><th>Kod</th><th>Nama Sekolah</th><th>Bilangan Peserta</th></tr></thead>
      <tbody id="schoolList"></tbody>
    </table>
  </div>
  <div class="card">
    <h2 class="section-title">Kategori</h2>
    <table>
      <thead><tr><th>Kod</th><th>Kategori</th><th>Bilangan Peserta</th></tr></thead>
      <tbody id="categoryList"></tbody>
    </table>
  </div>
</main>
<script src="app.js"></script>
<script>
async function load() {
  // /api/checkins is admin/official only (see routes/checkins.js) - a
  // School Manager can still view this dashboard, just without that one
  // stat, rather than the whole page failing to load. null (not []) marks
  // "not visible to this role" so it's hidden, not shown as a misleading 0.
  //
  // /api/students/summary (not /api/students) is used for the counts below:
  // /api/students itself is scoped to "own school only" for a School
  // Manager (protects other schools' participant names), which used to
  // make this whole dashboard collapse to that one school's numbers.
  // /summary is aggregate-only (no names), so every role sees the true
  // event-wide totals.
  //
  // v1.6.2 hotfix: this used to be a single Promise.all(), so ANY one
  // request failing (e.g. /api/students/summary 403 on an environment whose
  // role_permissions.json hadn't picked up the 'dashboard.view' key yet -
  // see CHANGELOG) rejected the whole thing and left every section stuck on
  // its initial "Loading..." placeholder forever, with nothing but an
  // unhandled promise rejection in the console to explain why. Promise.
  // allSettled() means one failing request degrades only the section that
  // depends on it - the rest of the dashboard still renders - and the
  // failure is shown on-page (not just logged) so it's diagnosable without
  // opening devtools.
  const [schoolsR, categoriesR, summaryR, resultsR, checkinsR] = await Promise.allSettled([
    fetchJSON('/api/schools'),
    fetchJSON('/api/categories'),
    fetchJSON('/api/students/summary'),
    fetchJSON('/api/results'),
    fetchJSON('/api/checkins'),
  ]);

  const schools = schoolsR.status === 'fulfilled' ? schoolsR.value : [];
  const categories = categoriesR.status === 'fulfilled' ? categoriesR.value : [];
  const results = resultsR.status === 'fulfilled' ? resultsR.value : [];
  // checkins: null covers both "role not allowed to see this" (pre-existing
  // convention) and "request failed" - either way the stat is just omitted.
  const checkins = checkinsR.status === 'fulfilled' ? checkinsR.value : null;

  [schoolsR, categoriesR, resultsR].forEach((r) => {
    if (r.status === 'rejected') console.error('Dashboard: a request failed:', r.reason);
  });

  const checkinsStat = checkins
    ? `<div class="stat-box" style="background:#8ab17d"><h3>${checkins.length}</h3><p>Sudah Daftar Masuk</p></div>`
    : '';

  if (summaryR.status === 'fulfilled') {
    const summary = summaryR.value;
    document.getElementById('summary').innerHTML = `
      <div class="stat-box"><h3>${schools.length}</h3><p>Sekolah</p></div>
      <div class="stat-box" style="background:#457b9d"><h3>${summary.totalStudents}</h3><p>Peserta Berdaftar</p></div>
      ${checkinsStat}
      <div class="stat-box" style="background:#2a9d8f"><h3>${results.length}</h3><p>Masa Direkod</p></div>
      <div class="stat-box" style="background:#d62828"><h3>${summary.totalStudents - results.length}</h3><p>Belum Selesai</p></div>
    `;

    document.getElementById('schoolList').innerHTML = schools.map((sch) => {
      const entry = summary.perSchool.find((p) => p.schoolCode === sch.code);
      const count = entry ? entry.count : 0;
      return `<tr><td>${schoolBadge(sch.code, schools)}</td><td>${escapeHTML(sch.name)}</td><td>${count}</td></tr>`;
    }).join('');

    document.getElementById('categoryList').innerHTML = categories.map((cat) => {
      const entry = summary.perCategory.find((p) => p.categoryCode === cat.code);
      const count = entry ? entry.count : 0;
      return `<tr><td>${categoryBadge(cat.code, categories)}</td><td>${cat.label}</td><td>${count}</td></tr>`;
    }).join('');
    return;
  }

  // Summary failed: show the real error on-page (not a silent blank/stuck
  // "Loading...") and still render the school/category names we do have
  // from their own (independent) requests, just without participant counts.
  console.error('Dashboard: /api/students/summary failed:', summaryR.reason);
  document.getElementById('summary').innerHTML =
    `<p class="empty" style="color:#d62828">Ralat memuatkan ringkasan: ${escapeHTML(summaryR.reason.message)}</p>`;

  document.getElementById('schoolList').innerHTML = schools.map((sch) =>
    `<tr><td>${schoolBadge(sch.code, schools)}</td><td>${escapeHTML(sch.name)}</td><td>-</td></tr>`
  ).join('') || '<tr><td colspan="3" class="empty">Tiada data.</td></tr>';

  document.getElementById('categoryList').innerHTML = categories.map((cat) =>
    `<tr><td>${categoryBadge(cat.code, categories)}</td><td>${cat.label}</td><td>-</td></tr>`
  ).join('') || '<tr><td colspan="3" class="empty">Tiada data.</td></tr>';
}
requireLogin(['admin', 'school', 'official']).then((user) => { if (user) load(); });
</script>
</body>
</html>
