<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Masuk - Merentas Desa 2026</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css">
<style>
body { display: flex; flex-direction: column; min-height: 100vh; }
main { display: flex; align-items: center; justify-content: center; flex: 1; }
.login-card { max-width: 400px; width: 100%; margin: 0 1rem; }
.login-card h1 { font-size: 1.1rem; text-align: center; margin-bottom: 0.25rem; }
.login-card h2 { font-size: 0.9rem; text-align: center; color: var(--text-secondary); font-weight: 500; margin-top: 0; margin-bottom: 1.5rem; }
</style>
</head>
<body>
<main style="margin: 0; padding: 0;">
  <div class="card login-card">
    <h1>KEJOHANAN MERENTAS DESA 2026</h1>
    <h2>Log Masuk</h2>
    <form id="loginForm">
      <label>Nama Pengguna</label>
      <input type="text" id="username" autocomplete="username" required autofocus>
      <label>Kata Laluan</label>
      <input type="password" id="password" autocomplete="current-password" required>
      <button type="submit" style="width:100%;">Log Masuk</button>
    </form>
    <p id="msg"></p>
  </div>
</main>
<script src="app.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');
  try {
    const user = await fetchJSON('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    if (user.mustChangePassword) {
      window.location.href = 'change-password.html';
    } else {
      window.location.href = 'index.html';
    }
  } catch (err) {
    msg.textContent = err.message;
    msg.style.color = 'red';
  }
});

// If already logged in (valid session cookie), skip the login form.
(async () => {
  try {
    const res = await fetch('/api/auth/me');
    if (res.ok) {
      const user = await res.json();
      window.location.href = user.mustChangePassword ? 'change-password.html' : 'index.html';
    }
  } catch (err) {
    // not logged in - stay on this page
  }
})();
</script>
</body>
</html>
