<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maklumat Sistem - Merentas Desa 2026</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="title-block">
    <h1>KEJOHANAN MERENTAS DESA SEMPENA HARI KEBANGSAAN 2026</h1>
    <h2>PERINGKAT SEKOLAH ZON LUAR BANDAR</h2>
  </div>
  <nav></nav>
</header>
<main>
  <div class="card">
    <h2 class="section-title">Maklumat Sistem</h2>
    <table id="infoTable">
      <tbody></tbody>
    </table>
  </div>
</main>
<script src="app.js"></script>
<script>
async function load() {
  const info = await fetchJSON('/api/system-info');
  const rows = [
    ['Nama Sistem', escapeHTML(info.systemName)],
    ['Acara Semasa', info.currentEvent.map(escapeHTML).join('<br>')],
    ['Pembangun', escapeHTML(info.developer)],
    ['Versi', escapeHTML(info.version)],
    ['Status Pelayan', `<span style="color:var(--teal)">${escapeHTML(info.serverStatus)}</span>`],
    ['Status Storan Data', `<span style="color:var(--teal)">${escapeHTML(info.dataStoreStatus)}</span>`],
    ['Alamat Setempat (Local)', `<code>${escapeHTML(info.localUrl)}</code>`],
    ['Alamat Rangkaian (Network)', info.networkUrls.length
      ? info.networkUrls.map((u) => `<code>${escapeHTML(u)}</code>`).join('<br>')
      : 'Tiada alamat rangkaian dikesan'],
    ['Pengguna Log Masuk Semasa', `${escapeHTML(info.currentUser.username)} (${escapeHTML(info.currentUser.role)}${info.currentUser.schoolCode ? ' &middot; ' + escapeHTML(info.currentUser.schoolCode) : ''})`],
  ];
  document.querySelector('#infoTable tbody').innerHTML = rows
    .map(([label, value]) => `<tr><th style="text-align:left;width:40%;">${label}</th><td>${value}</td></tr>`)
    .join('');
}

requireLogin(['admin']).then((user) => { if (user) load(); });
</script>
</body>
</html>
